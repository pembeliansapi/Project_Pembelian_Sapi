<!DOCTYPE html>
<html>
<head>
<title>Sistem Stok Sapi</title>
<link rel="stylesheet" href="Style/style.css">
</head>

<body>
    <div class="navbar">
    <img src="img/icon home.png" alt="Home"> <span>Home</span>
    </div>

    <h1>Sistem Pembelian Sapi</h1>

    <div class="container">

    <h2>Stok Sapi</h2>

    <div class="pesan-sapi">
    <label>Jenis Sapi :</label>
    <select id="jenis">
        <option>Pilih Jenis Sapi</option> 
        <option value="limosin">Limosin</option>
        <option value="brahman">Brahman</option>
        <option value="simental">Simental</option>
        <option value="angus">Angus</option>
    </select>
    </div>

    <div class="pesan-sapi">
        <label>Berat :</label>
        <input type="number" id="berat">
    </div>

    <div class="pesan-sapi">
        <label>Umur :</label>
        <input type="number" id="umur">
    </div>

        <button id="tambahBtn">Tambah Sapi</button>

    </div>

    <div id="totalStok"> 
        <p>Total Sapi Terjual: <span id="totalJumlah">0</span></p>
        <p>Total Harga Terjual: <span id="totalNilai">Rp 0</span></p>

        <p> <img src="img/sapi berwarna.png" alt="Sapi" width="80px" height="80px"> 
        Total Sapi Terjual: <span id="totalJumlah">0</span></p>
        <p><img src="img/uang.png" alt="Uang" width="70px" height="70px"> 
        Harga Terjual: <span id="totalNilai">Rp 0</span></p>
         
    </div>

    <h2>Data Sapi Terjual</h2>

    <table border="1">
    <thead>
    <tr>
    <th>No</th>
    <th>ID</th>
    <th>Jenis</th>
    <th>Berat</th>
    <th>Harga</th>
    <th>Umur</th>
    <th>tanggal Beli</th>
    <th></th>
    </tr>
    </thead>

    <tbody id="tabelSapi"></tbody>

    </table>

<script src="script.js"></script>

</body>
</html>
