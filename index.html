<!DOCTYPE html>
<html>
<head>
    <title>Sistem Stok Sapi</title>
    <link rel="stylesheet" href="Style/style.css">
</head>
<body>
    <div class="navbar">
        <img src="img/icon home.png" alt="Home" width="30px" height="30px"> <span>Home</span>
    </div>

    <h1>Sistem Pembelian Sapi</h1>

    <div class="content">
        
        <div class="container">
            <h2>Transaksi Penjualan Sapi</h2>
            <div class="pesan-sapi">
                <label>Jenis Sapi :</label>
                <select id="jenis">
                    <option>Pilih Jenis Sapi</option> 
                    <option value="limosin">Limosin</option>
                    <option value="brahman">Brahman</option>
                    <option value="simental">Simental</option>
                    <option value="angus">Angus</option>
                </select>
            </div>
            <div class="pesan-sapi">
                <label>Berat :</label>
                <input type="number" id="berat" placeholder="kg">
            </div>
            <div class="pesan-sapi">
                <label>Umur :</label>
                <input type="number" id="umur" placeholder="tahun">
            </div>
            <button id="tambahBtn">Simpan Penjualan</button>
        </div>

        <div id="status-container"> 
            <div class="card">
                <img src="img/sapi.png" alt="Sapi">
                <div>
                    <p class="label">Data Sapi Terjual</p>
                    <p class="value"><span id="totalJumlah">0</span></p>
                </div>
            </div>
            <div class="card1">
                <img src="img/uang.png" alt="Uang">
                <div>
                    <p class="label">Harga Terjual</p>
                    <p class="value"><span id="totalNilai">Rp 0</span></p>
                </div>
            </div>
        </div>
    </div>

    <div class="table-container">
        <h2 class="table-title">Data Sapi Terjual</h2>

     <table class="tabel-sapi">
        <thead>
            <tr>
                <th>No</th>
                <th>ID</th>
                <th>Jenis</th>
                <th>Berat</th>
                <th>Harga</th>
                <th>Umur</th>
                <th>Tanggal Beli</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelSapi"> </tbody>
    </table>
</div>
    <script src="script.js"></script>
</body> 
</html>
